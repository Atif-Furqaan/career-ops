# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- Mechanical Design Engineer roles --
    - "Mechanical Design Engineer"
    - "Design Engineer"
    - "SolidWorks"
    - "CAD Engineer"
    - "CAD Designer"
    - "Product Design"
    - "Design for Manufacture"
    - "DFM"
    - "Manufacturing Engineer"
    - "Technical Draughtsman"
    - "Draughtsman"
    - "Design Draughtsman"
    - "Engineering Design"
    - "Technical Design"
    - "Mechanical Engineering"
    - "Production Design"
    - "CAD Manager"
    - "Design Team Lead"
    - "Design Manager"
    - "Senior Design Engineer"
    - "Mid-level Design"
    - "Drawing Package"
    - "Technical Documentation"
    - "Fabrication Design"
    - "Sheet Metal Design"
    - "Weldment Design"
    - "Enclosure Design"
    - "NX Engineer"
    - "AutoCAD"
    - "Fusion 360"
    - "Parametric Design"
    - "Automation Design"
    - "DriveWorks"
    # -- Visa sponsorship roles (Tier 2, Skilled Worker) --
    - "Visa sponsorship"
    - "Tier 2 sponsor"
    - "Skilled Worker route"
    - "Sponsorship available"
    - "UK visa support"
    - "Visa support"
    - "Relocation package"
    - "International candidate"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Trainee"
    - "Apprentice"
    - "Software"
    - "Web"
    - "Mobile"
    - "Frontend"
    - "Backend"
    - "DevOps"
    - "Data"
    - "Sales"
    - "Support"
    - "Admin"
    - "Clerical"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Indeed UK --
  - name: Indeed UK — Mechanical Design Engineer
    query: 'site:indeed.co.uk "Mechanical Design Engineer" OR "Design Engineer" SolidWorks UK'
    enabled: true

  - name: Indeed UK — CAD Engineer
    query: 'site:indeed.co.uk "CAD Engineer" OR "SolidWorks" "Design" manufacturing'
    enabled: true

  - name: Indeed UK — Manufacturing Design
    query: 'site:indeed.co.uk "Design for Manufacture" OR "DFM" OR "Product Design" engineering'
    enabled: true

  # -- LinkedIn UK --
  - name: LinkedIn UK — Mechanical Design
    query: 'site:linkedin.com "Mechanical Design Engineer" OR "Design Engineer" UK location'
    enabled: true

  - name: LinkedIn UK — SolidWorks
    query: 'site:linkedin.com SolidWorks "Design Engineer" OR "Mechanical Engineer" UK'
    enabled: true

  # -- Totaljobs --
  - name: Totaljobs — Design Engineer
    query: 'site:totaljobs.com "Design Engineer" OR "Mechanical Design" SolidWorks'
    enabled: true

  - name: Totaljobs — CAD Design
    query: 'site:totaljobs.com CAD "Design Engineer" OR "Technical Draughtsman" manufacturing'
    enabled: true

  # -- Reed.co.uk --
  - name: Reed — Mechanical Design Engineer
    query: 'site:reed.co.uk "Mechanical Design Engineer" OR "Design Engineer" SolidWorks'
    enabled: true

  - name: Reed — CAD Engineering
    query: 'site:reed.co.uk "CAD Engineer" OR "CAD Designer" "Design" manufacturing'
    enabled: true

  # -- CWJobs --
  - name: CWJobs — Design Engineer
    query: 'site:cwjobs.co.uk "Design Engineer" OR "Mechanical Design" SolidWorks'
    enabled: true

  # -- Heidrick & Struggles / Exec roles --
  - name: Heidrick — Design Manager/Lead
    query: 'site:heidrick.com OR site:experteer.com "Design Manager" OR "Design Lead" "Mechanical" OR "Engineering"'
    enabled: true

  # -- Engineering-specific boards --
  - name: Engineering Jobs UK
    query: 'site:engineersjobs.co.uk "Design Engineer" OR "Mechanical" "SolidWorks" OR "CAD"'
    enabled: true

  - name: MechanicalJobs.com
    query: 'site:mechanicaljobs.com OR "mechanical engineer" "design" UK manufacturing'
    enabled: true

  # -- Specialist Manufacturing/Engineering --
  - name: The Manufacturer Jobs
    query: '"Mechanical Design" OR "Design Engineer" "SolidWorks" OR "CAD" UK manufacturing'
    enabled: true

  - name: Manufacturing Design Jobs
    query: '"Design Engineer" OR "CAD Engineer" "Design for Manufacture" OR "DFM" UK'
    enabled: true

  # -- Specialist Design Boards --
  - name: DesignCareers UK
    query: 'site:designcareers.co.uk "Design Engineer" OR "Mechanical" OR "Product Design"'
    enabled: true

  # -- Glassdoor UK --
  - name: Glassdoor UK — Design Engineer
    query: 'site:glassdoor.co.uk "Design Engineer" OR "Mechanical Design" SolidWorks UK'
    enabled: true

  # -- Monster UK --
  - name: Monster UK — CAD Design
    query: 'site:monster.co.uk "Design Engineer" OR "CAD Engineer" "Mechanical" OR "Manufacturing"'
    enabled: true

  # -- Graduate/Entry-level (with filter to exclude junior roles) --
  - name: Grad Schemes — Design Engineer
    query: 'site:targetjobs.co.uk OR site:graduatejobs.com "Design Engineer" OR "Mechanical Engineering" graduate'
    enabled: false

  # -- Broad search across major boards --
  - name: Broad UK Search — Design & CAD
    query: '"Design Engineer" OR "SolidWorks" "Mechanical" OR "Manufacturing" UK -junior -graduate -intern'
    enabled: true

  - name: Broad UK Search — CAD Manager/Senior
    query: '"CAD Manager" OR "Senior Design" OR "Design Lead" "SolidWorks" OR "NX" UK manufacturing'
    enabled: true

  - name: YC Jobs — Applied AI
    query: 'site:workatastartup.com "Applied AI" OR "AI Engineer" OR "AI Agent" remote Europe'
    enabled: true

  # -- Spanish market specialized (high-value for Madrid/Barcelona-based candidates) --

  - name: Manfred — Tech Senior España
    query: 'site:getmanfred.com/en/job-offers "Solutions Architect" OR "DevRel" OR "Forward Deployed" OR "AI Engineer" OR "Founding"'
    enabled: true

  - name: Manfred — Remote AI/Senior
    query: 'site:getmanfred.com "remote" "AI" OR "Senior" OR "Staff" OR "Lead"'
    enabled: true

  - name: Tecnoempleo — España IT
    query: 'site:tecnoempleo.com "AI Engineer" OR "Solutions Architect" OR "DevRel" OR "Forward Deployed" OR "Founding Engineer"'
    enabled: true

  - name: Tecnoempleo — Remoto Senior
    query: 'site:tecnoempleo.com "remoto" OR "remote" Senior "AI" OR "Architect" OR "Lead"'
    enabled: true

  - name: JobFluent — Spain startups
    query: 'site:jobfluent.com Madrid OR Barcelona "AI" OR "Engineer" OR "Solutions" OR "DevRel"'
    enabled: true

  - name: Welcome to the Jungle — Spain tech
    query: 'site:welcometothejungle.com Spain OR Madrid OR Barcelona "AI Engineer" OR "Solutions Architect" OR "DevRel" OR "Forward Deployed"'
    enabled: true

  # -- DevRel-specific boards --

  - name: DevRelX Jobs
    query: 'site:devrelx.com/jobs remote OR Europe OR EMEA'
    enabled: true

  - name: TrueUp — DevRel roles
    query: 'site:trueup.io/devrel OR site:trueup.io "Developer Advocate" OR "DevRel" remote Europe'
    enabled: true

  - name: Remote Rocketship — DevRel
    query: 'site:remoterocketship.com/jobs/developer-relations OR site:remoterocketship.com "DevRel" remote'
    enabled: true

  - name: DevRel Job board
    query: 'site:devreljob.com remote OR Europe OR EMEA'
    enabled: true

  # -- European / global aggregators --

  - name: Himalayas — Remote AI/Dev-tools
    query: 'site:himalayas.app "AI Engineer" OR "Solutions Architect" OR "Developer Advocate" OR "Forward Deployed" OR "Founding Engineer" Europe'
    enabled: true

  - name: Jooble — España Tech Senior
    query: 'site:jooble.org "AI Engineer" OR "Solutions Architect" OR "DevRel" Madrid OR remote España'
    enabled: true

  - name: EU Data Jobs — AI/ML Europe
    query: 'site:eudatajobs.com "AI" OR "ML" OR "Data" "Engineer" OR "Architect" remote Europe'
    enabled: true

  - name: HN Who's Hiring — Remote AI
    query: 'site:news.ycombinator.com OR site:hnrss.org "AI Engineer" OR "Forward Deployed" OR "DevRel" OR "Founding Engineer" remote'
    enabled: true

